[dev]
# Kommagetrennte Liste reservierter Nicknames – können nur vom Dev-Admin verwendet werden
reserved_nicknames =

# Kommagetrennte Liste der E-Mail-Adressen des Dev-Admins (Google-Account)
# Bestimmt: Debug-Befehle, reservierte Nicknames, Owner-Rechte im Admin-Panel
reserved_emails =

# Discord-Einladungslink (leer = kein Discord-Link angezeigt)
discord_invite =

[lobby]
# Sekunden die auf einen Ersteller-Reconnect gewartet wird, bevor die Lobby geschlossen wird (Einzel- und Mehrspielermodus)
ersteller_reconnect_timeout = 90

# Minuten Inaktivität bis ein Spieler als AFK markiert wird (0 = deaktiviert)
afk_timeout_min = 5

[finanzen]
# Eintrittspreis pro Zuschauer in DM – bestimmt die Haupteinnahmequelle bei Heimspielen
ticketpreis = 3

# Maximale Zuschauerzahl pro Heimspiel in der 1. Bundesliga
zuschauer_max_bl1 = 65000

# Maximale Zuschauerzahl pro Heimspiel in der 2. Bundesliga
zuschauer_max_bl2 = 40000

# Einfluss des Heim-Tabellenplatzes auf die Zuschauerzahl (0.0–1.0, Summe mit _gast = 1.0)
zuschauer_heim_gewicht = 0.70

# Einfluss des Gast-Tabellenplatzes auf die Zuschauerzahl (0.0–1.0, Summe mit _heim = 1.0)
zuschauer_gast_gewicht = 0.30

# Unterer Zufallsmultiplikator für die Zuschauerzahl (z.B. 0.8 = bis zu 20% weniger)
zuschauer_zufall_min = 0.80

# Oberer Zufallsmultiplikator für die Zuschauerzahl (z.B. 1.2 = bis zu 20% mehr)
zuschauer_zufall_max = 1.20

# Startkapital jedes Teams zu Saisonbeginn in DM
team_startbudget = 6000000

# Wöchentlicher Zinssatz auf negative Kontostände (0.03 = 3% Schuldzinsen pro Woche)
kontozins_faktor = 0.02

# Globaler Multiplikator auf alle Spielergehälter (1.0 = Standardgehälter, 0.5 = halbierte Gehälter)
gehalt_faktor = 1.0

# Einnahmen-Multiplikator für DFB-Pokal-Spiele (alle BL-Teams qualifiziert → geringer Bonus)
einnahmen_multiplikator_dfb = 1.3

# Einnahmen-Multiplikator für UEFA-Pokal-Spiele (Plätze 2–5 + DFB-Halbfinalist → mittlerer Bonus)
einnahmen_multiplikator_uefacup = 1.8

# Einnahmen-Multiplikator für Pokalsieger-Cup-Spiele (nur DFB-Pokalsieger → hoher Bonus)
einnahmen_multiplikator_pokalsieger = 2.5

# Einnahmen-Multiplikator für ECL-Spiele (nur Meister qualifiziert → höchster Bonus)
einnahmen_multiplikator_ecl = 3.5

[entwicklung]
# Minimale Stärkeänderung eines Inländers pro Saison (negativ = Leistungsabfall möglich)
entwicklung_min = -15

# Maximale Stärkeänderung eines Inländers pro Saison (positiv = Leistungssteigerung)
entwicklung_max = 10

# Wahrscheinlichkeit, dass ein Ausländer in einer Saison einen Einbruch erleidet (0.0–1.0)
auslaender_einbruch_chance = 0.25

# Untere Grenze der Stärke nach einem Ausländer-Einbruch (Stärke fällt auf diesen Wert)
auslaender_einbruch_min = 58

# Obere Grenze der Stärke nach einem Ausländer-Einbruch (Stärke fällt auf diesen Wert)
auslaender_einbruch_max = 68

[match]
# Wartezeit in Sekunden pro simulierter Spielminute (0.5 = doppelte Geschwindigkeit, 1.0 = Echtzeit)
sekunden_pro_minute = 0.5

# Maximale Schusswahrscheinlichkeit pro Minute – verhindert zu viele Torchancen
schuss_chance_cap = 0.22

# Maximale Torwahrscheinlichkeit pro Schuss – verhindert Torregen
tor_chance_cap = 0.32

# Mindestabstand zwischen zwei Toren in Spielminuten – verhindert Serien im Minutentakt
tor_abstand_min = 4

# Mindestabstand in Spielminuten bevor derselbe Spieler eine zweite Gelbe Karte bekommen kann
gelb_abstand_min = 10

# Verletzungswahrscheinlichkeit pro Spieler pro Spiel (0.0275 = ca. 2.75% Chance je Spieler)
verletzung_wahrscheinlichkeit = 0.0325

# Unterer Stärkemalus bei leicht ungewöhnlicher Aufstellung (10 Feldspieler, nicht Standard)
formations_malus_min = 0.10

# Oberer Stärkemalus bei leicht ungewöhnlicher Aufstellung (10 Feldspieler, nicht Standard)
formations_malus_max = 0.20

# Unterer Stärkemalus bei sehr ungewöhnlicher Aufstellung (nicht 10 Feldspieler)
formations_malus_extrem_min = 0.20

# Oberer Stärkemalus bei sehr ungewöhnlicher Aufstellung (nicht 10 Feldspieler)
formations_malus_extrem_max = 0.35

# Wahrscheinlichkeit pro Spielminute, dass ein Torwart eine Gelbe Karte sieht
gelb_torwart = 0.02

# Wahrscheinlichkeit pro Spielminute, dass ein Abwehrspieler eine Gelbe Karte sieht
gelb_abwehr = 0.25

# Wahrscheinlichkeit pro Spielminute, dass ein Mittelfeldspieler eine Gelbe Karte sieht
gelb_mittelfeld = 0.20

# Wahrscheinlichkeit pro Spielminute, dass ein Stürmer eine Gelbe Karte sieht
gelb_sturm = 0.10

# Fixer Angriffsstärke-Bonus für das Heimteam (0.10 = +10% auf Angriffsstärke)
heimvorteil_fest = 0.10

# Basis-Schusschance bei gleich starken Teams (wird mit Stärkeverhältnis multipliziert)
schuss_chance_basis = 0.12

# Basis-Torchance pro Schuss bei gleich starken Teams (wird mit Stärkeverhältnis multipliziert)
tor_chance_basis = 0.18

# Gewichtung der Abwehrstärke beim Torwart-Vergleich in der Torchance (0.3 = 30% der Abwehr)
torwart_abwehr_gewicht = 0.30

# Mittelfeld-Dominanz-Faktor: wie stark MF-Überlegenheit den Angriff boosted (0.2 = max. +20%)
mf_dominanz_faktor = 0.20

# Eigentor-Wahrscheinlichkeit pro Torchance (0.01 = 1%)
eigentor_chance = 0.01

# Stärkemalus pro Roter Karte auf das betroffene Team (0.09 = 9% Stärkeabzug pro Spieler)
rot_staerke_malus = 0.09

# Stärkefaktor für Not-Torwart (wenn kein TW in der Startelf; 0.6 = 60% des schwächsten Feldspielers)
not_torwart_faktor = 0.60

# Rot-Sperre: Mindestdauer in Wochen
rot_sperre_min = 2

# Rot-Sperre: Maximaldauer in Wochen
rot_sperre_max = 5

# Gelbe-Karten-Zyklus-Schwelle: ab dieser Anzahl im Zyklus gibt es 1 Spiel Sperre
gelb_zyklus_schwelle = 5

[cpu_ai]
# Maximale Kadergröße – ab dieser Anzahl kauft die CPU keine weiteren Spieler
kader_max_kauf = 18

# Minimale Kadergröße – unter dieser Anzahl listet die CPU keine Spieler zum Verkauf
kader_min_list = 13

# Wahrscheinlichkeit, dass die CPU pro Woche einen Spieler kauft (0.0–1.0)
kauf_wahrscheinlichkeit = 0.20

# Zusätzliche Wahrscheinlichkeit, dass die CPU gezielt einen Ausländer kauft (0.0–1.0)
ausland_kauf_chance = 0.15

# Wahrscheinlichkeit, dass die CPU einen unterdurchschnittlichen Spieler zum Verkauf listet
listing_unterdurchschnitt_chance = 0.40

# Spieler unter diesem Anteil des Teamdurchschnitts gelten als listbar (0.70 = unter 70%)
listing_schwelle_faktor = 0.70

[transfer]
# Maximale Anzahl Spieler im Kader – gilt für Spieler- und CPU-Teams gleichermaßen
kader_max = 20

# Minimaler Kaufpreisfaktor auf den Marktwert (0.90 = mind. 90% des Marktwerts)
kauf_faktor_min = 0.90

# Maximaler Kaufpreisfaktor auf den Marktwert (1.20 = max. 120% des Marktwerts)
kauf_faktor_max = 1.20

# Sofortverkauf: untere Grenze des Erlöses als Anteil am Marktwert (Dreiecksverteilung)
notverkauf_min = 0.50

# Sofortverkauf: obere Grenze des Erlöses als Anteil am Marktwert (Dreiecksverteilung)
notverkauf_max = 0.90

# Sofortverkauf: wahrscheinlichster Erlös als Anteil am Marktwert (Dreiecksverteilung)
notverkauf_peak = 0.75

# Zwangsverkauf (gelistet, nicht verkauft): untere Erlösgrenze als Anteil am Marktwert
zwangsverkauf_min = 0.85

# Zwangsverkauf (gelistet, nicht verkauft): obere Erlösgrenze als Anteil am Marktwert
zwangsverkauf_max = 1.20

# Zwangsverkauf (gelistet, nicht verkauft): wahrscheinlichster Erlös als Anteil am Marktwert
zwangsverkauf_peak = 0.98

# Wahrscheinlichkeit, dass das wöchentliche Auslandsangebot ein Weltklasse-Spieler ist (0.0–1.0)
# 0.30 = 30% Weltklasse, 70% Sehr stark
ausland_wk_chance = 0.30

[nachwuchs]
# Anzahl neuer inländischer Spieler (D), die am Saisonende in den Spielerpool eingespeist werden
neue_spieler_de = 40

# Anzahl neuer ausländischer Spieler (A), die am Saisonende in den Spielerpool eingespeist werden
neue_spieler_a = 10

# Mindeststärke neu generierter inländischer Nachwuchsspieler (1–100)
nachwuchs_min_de = 40

# Maximale Stärke neu generierter inländischer Nachwuchsspieler (1–100)
nachwuchs_max_de = 70

# Mindeststärke neu generierter ausländischer Nachwuchsspieler (1–100)
nachwuchs_min_a = 76

# Maximale Stärke neu generierter ausländischer Nachwuchsspieler (1–100)
nachwuchs_max_a = 100

# Gedankenstütze zur Stärke (für Spielerentwicklung und Kaderplanung):
  # Weltklasse   = 85 – 100
  # Sehr stark   = 70 – 90
  # Stark        = 55 – 75
  # Durchschnitt = 40 – 60
  # Schwach      = 20 – 45
  # Sehr schwach =  1 – 25

[radio]
# Standard-Radioformat für neue Spieler – MP3 (KI-generiert): 1 = aktiv, 0 = inaktiv
standard_mp3 = 0

# Standard-Radioformat für neue Spieler – SID (C64-Chiptune): 1 = aktiv, 0 = inaktiv
standard_sid = 0

# Standard-Radioformat für neue Spieler – MOD (Amiga-Tracker): 1 = aktiv, 0 = inaktiv
standard_mod = 0

# Standard-Radioformat für neue Spieler – Soccermaster OST (nur Soccermaster*.mp3): 1 = aktiv, 0 = inaktiv
standard_ost = 1

# Radio beim Seitenaufruf automatisch starten: 1 = ja, 0 = nein
standard_auto = 0
